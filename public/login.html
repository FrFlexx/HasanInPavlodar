<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hasan in Pavlodar - вход</title>
    <link rel="stylesheet" href="./styles.css?v=42">
  </head>
  <body class="host-body">
    <main class="stage-shell">
      <section class="race-stage login-mode" aria-label="Вход ведущего">
        <video class="home-video-bg" autoplay muted loop playsinline preload="auto">
          <source src="./assets/home%20fone.mp4?v=1" type="video/mp4">
        </video>

        <form class="login-panel" id="loginForm">
          <h1>Вход ведущего</h1>
          <label>
            <span>Логин</span>
            <input id="loginInput" name="login" autocomplete="username" autofocus>
          </label>
          <label>
            <span>Пароль</span>
            <input id="passwordInput" name="password" type="password" autocomplete="current-password">
          </label>
          <button class="phone-button" id="loginButton" type="submit">Войти</button>
          <p class="phone-status" id="loginStatus">Введите логин и пароль ведущего.</p>
        </form>
      </section>
    </main>

    <script src="./login.js?v=2"></script>
  </body>
</html>
